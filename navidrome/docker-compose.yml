x-volumes:
  - &music_staging "${MUSIC_STAGING_PATH:?MUSIC_STAGING_PATH not set}:/music-staging"

services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000 # should be owner of volumes
    restart: always
    networks:
      - navidrome
    expose:
      - "4533"
    volumes:
      - "${APP_DATA:?APP_DATA not set}/navidrome:/data"
      - "${MUSIC_LIBRARY_PATH:?MUSIC_LIBRARY_PATH not set}:/music:ro"
      - *music_staging
    environment:
      # - ND_LOGLEVEL=debug
      - ND_ENABLEINSIGHTSCOLLECTOR=false
      - ND_ENABLESHARING=true
      - ND_PID_ALBUM=albumartistid,album,albumversion,releasedate

  navidrome-octo-fiesta:
    # TODO: remove dev tag once SquidWTF is fixed in master
    # https://github.com/V1ck3s/octo-fiesta/issues/124
    image: ghcr.io/v1ck3s/octo-fiesta:141082a
    container_name: navidrome-octo-fiesta
    user: 1000:1000
    restart: always
    networks:
      - navidrome
    expose:
      - "8080"
    volumes:
      - *music_staging
    env_file:
      - octo-fiesta.env
