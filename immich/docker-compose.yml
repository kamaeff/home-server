#
# WARNING: To install Immich, follow our guide: https://docs.immich.app/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
# https://github.com/immich-app/immich/releases/latest/download/example.env
#
# The compose file on main may not be compatible with the latest release.

name: immich

services:
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${APP_DATA:?APP_DATA not set}/immich/library:/data
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      TZ: ${TZ}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_USERNAME: ${IMMICH_DB_USERNAME}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE_NAME}
      DB_HOSTNAME: immich-database
      REDIS_HOSTNAME: immich-redis
    expose:
      - '2283'
    depends_on:
      - immich-redis
      - immich-database
    networks:
      - immich-front
      - immich-back
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release} #-openvino
# unkomment to enable OpenVINO hwaccel on Intel iGPU
# currently disabled – OCR performance became lower, cpu became busier
#     device_cgroup_rules:
#       - 'c 189:* rmw'
#     devices:
#       - /dev/dri:/dev/dri
    volumes:
      - ${APP_DATA:?APP_DATA not set}/immich/model-cache:/cache
#       - /dev/bus/usb:/dev/bus/usb
    restart: always
    networks:
      - immich-back
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:fb8d272e529ea567b9bf1302245796f21a2672b8368ca3fcb938ac334e613c8f
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - immich-back

  immich-database:
    container_name: immich-database
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Network shares are not supported for the database
      - ${APP_DATA:?APP_DATA not set}/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      - immich-back
