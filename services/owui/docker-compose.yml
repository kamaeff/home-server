services:
  owui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: owui
    networks:
      - owui
    expose:
      - 8080
    volumes:
      - ./volumes/state/data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

networks:
  owui:
