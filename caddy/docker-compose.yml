services:
  caddy:
    build: .
    container_name: caddy
    restart: unless-stopped
    networks:
      - vw
      - copyparty
      - navidrome
      - picard
      - immich-front
      - linkwarden-front

    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APP_DATA:?APP_DATA not set}/caddy/config:/config
      - ${APP_DATA:?APP_DATA not set}/caddy/data:/data
    env_file: caddy.env
